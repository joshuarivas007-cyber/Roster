<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>Station Ops</title><style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;padding:6px;font-size:14px}
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#16213e;border-radius:8px;margin-bottom:6px}
.header h1{font-size:16px;font-weight:600;color:#ff9f1c}
.header .date{font-size:12px;color:#aaa}
.tabs{display:flex;gap:3px;background:#0f3460;border-radius:6px;padding:3px;margin-bottom:6px}
.tabs button{flex:1;padding:7px 4px;font-size:11px;background:transparent;color:#aaa;border:none;border-radius:4px;font-weight:600;cursor:pointer}
.tabs button.active{background:#ff9f1c;color:#1a1a2e}
.stats-bar{display:flex;gap:8px;padding:6px 10px;background:#16213e;border-radius:8px;margin-bottom:6px;font-size:12px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:3px}
.stat .dot{width:8px;height:8px;border-radius:50%}
.dot-arrived{background:#2ecc71}.dot-noshow{background:#e74c3c}.dot-pending{background:#f39c12}.dot-total{background:#3498db}
.section{background:#16213e;border-radius:8px;padding:10px;margin-bottom:6px}
.section h2{font-size:14px;margin-bottom:8px;color:#ff9f1c}
.section p{font-size:11px;color:#aaa;margin-bottom:6px}
textarea{width:100%;height:100px;background:#0f3460;border:1px solid #333;border-radius:6px;color:#eee;padding:6px;font-size:11px;font-family:monospace;resize:vertical}
button{padding:8px 14px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.btn-primary{background:#ff9f1c;color:#1a1a2e}.btn-danger{background:#e74c3c;color:#fff}.btn-secondary{background:#333;color:#eee}
.btn-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.hidden{display:none}
.lane-selector{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.lane-btn{width:40px;height:40px;border-radius:8px;background:#0f3460;border:2px solid #555;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#aaa;cursor:pointer}
.lane-btn.active{background:#3498db;border-color:#3498db;color:#fff}
.roster-list{display:flex;flex-direction:column;gap:3px}
.roster-item{display:flex;align-items:center;padding:10px;background:#16213e;border-radius:8px;border-left:4px solid #f39c12}
.roster-item.arrived{border-left-color:#2ecc71;background:#1a2e1a}
.roster-item.noshow{border-left-color:#e74c3c;background:#2e1a1a}
.checks{display:flex;gap:5px;margin-right:8px;flex-shrink:0}
.chk{width:30px;height:30px;border:2px solid #555;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.chk-yes{border-color:#2ecc71}.chk-yes.active{background:#2ecc71;color:#fff}
.chk-no{border-color:#e74c3c}.chk-no.active{background:#e74c3c;color:#fff}
.roster-item .info{flex:1;min-width:0}
.roster-item .dp-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.roster-item .dp-details{font-size:10px;color:#aaa;margin-top:1px}
.roster-item .arrival-time{font-size:10px;color:#2ecc71;font-weight:600}
.roster-item .time-col{text-align:right;flex-shrink:0;margin-left:6px;font-size:11px}
.roster-item .scheduled-time{color:#ff9f1c;font-weight:500}
.roster-item .lane-badge{background:#3498db;color:#fff;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.wave-header{padding:5px 10px;background:#0f3460;border-radius:6px;font-size:12px;font-weight:600;color:#3498db;margin-top:6px;margin-bottom:3px}
.empty-state{text-align:center;padding:30px;color:#666}
.empty-state h2{font-size:16px;color:#aaa;margin-bottom:6px}
/* Lanes view */
.lane-card{background:#16213e;border-radius:8px;padding:10px;margin-bottom:6px;border-left:4px solid #3498db}
.lane-card h3{font-size:13px;color:#3498db;margin-bottom:6px}
.lane-card .count{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.lane-card .names{font-size:11px;color:#aaa;line-height:1.4}
/* Departures */
.dep-item{display:flex;align-items:center;padding:10px;background:#16213e;border-radius:8px;margin-bottom:3px;border-left:4px solid #f39c12}
.dep-item.ontime{border-left-color:#2ecc71}
.dep-item.late{border-left-color:#e74c3c}
.dep-item.atrisk{border-left-color:#f39c12}
.dep-item .info{flex:1}
.dep-item .dp-name{font-size:13px;font-weight:600}
.dep-item .dep-details{font-size:10px;color:#aaa;margin-top:2px}
.dep-item .status-badge{padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-right:8px}
.badge-green{background:#2ecc71;color:#fff}
.badge-yellow{background:#f39c12;color:#fff}
.badge-red{background:#e74c3c;color:#fff}
.dep-btn{padding:8px 12px;background:#2ecc71;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.otd-bar{background:#16213e;border-radius:8px;padding:10px;margin-bottom:6px;text-align:center}
.otd-bar .otd-pct{font-size:28px;font-weight:700}
.otd-bar .otd-label{font-size:11px;color:#aaa}
.otd-green{color:#2ecc71}.otd-yellow{color:#f39c12}.otd-red{color:#e74c3c}
/* Routes summary */
.summary-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#2e1a1a;border-radius:6px;margin-bottom:3px;border-left:4px solid #e74c3c}
.summary-item .svc-name{font-size:12px}.summary-item .route-count{font-size:16px;font-weight:700;color:#e74c3c}
.summary-total{display:flex;justify-content:space-between;padding:10px;background:#3d1a1a;border-radius:6px;margin-top:6px;border:2px solid #e74c3c}
.summary-total .label{font-size:13px;font-weight:600}.summary-total .count{font-size:20px;font-weight:700;color:#e74c3c}
.upload-area{border:2px dashed #3498db;border-radius:8px;padding:16px;text-align:center;margin-bottom:8px;cursor:pointer}
.upload-area p{color:#3498db;font-size:13px;font-weight:600}
.upload-area .sub{color:#666;font-size:10px;margin-top:3px;font-weight:400}
input[type=file]{display:none}
</style></head><body>
<div class="header"><h1>Station Ops</h1><div><div class="date" id="currentDate"></div></div></div>
<div class="tabs"><button id="tabArrivals" onclick="showTab('arrivals')">Arrivals</button><button id="tabDepartures" onclick="showTab('departures')">Departures</button><button id="tabLanes" onclick="showTab('lanes')">Lanes</button><button id="tabRoutes" onclick="showTab('routes')">Routes</button><button id="tabEdit" onclick="showTab('edit')">Edit</button></div>
<div class="stats-bar"><div class="stat"><div class="dot dot-arrived"></div><span id="arrivedCount">0</span> In</div><div class="stat"><div class="dot dot-noshow"></div><span id="noshowCount">0</span> No Show</div><div class="stat"><div class="dot dot-pending"></div><span id="pendingCount">0</span> Waiting</div><div class="stat"><div class="dot dot-total"></div><span id="totalCount">0</span> Total</div></div>

<!-- ARRIVALS TAB -->
<div id="viewArrivals">
<div class="section"><h2>Select Lane</h2><div class="lane-selector" id="laneSelector"></div></div>
<div class="roster-list" id="arrivalList"></div>
</div>

<!-- DEPARTURES TAB -->
<div id="viewDepartures" class="hidden">
<div class="otd-bar"><div class="otd-pct" id="otdPct">--</div><div class="otd-label">Live OTD %</div></div>
<div class="section"><h2>DPs in Lanes — Tap Departed when they leave</h2></div>
<div id="departureList"></div>
</div>

<!-- LANES TAB -->
<div id="viewLanes" class="hidden">
<div id="lanesView"></div>
</div>

<!-- ROUTES TAB -->
<div id="viewRoutes" class="hidden">
<div class="section"><h2>Routes to Open (No Shows)</h2><div id="summaryList"></div></div>
</div>

<!-- EDIT TAB -->
<div id="viewEdit" class="hidden">
<div class="section"><h2>Load Roster</h2>
<div class="upload-area" onclick="document.getElementById('fileInput').click()"><p>Tap to Upload Text File</p><p class="sub">.txt or .csv</p></div>
<input type="file" id="fileInput" accept=".txt,.csv" onchange="handleFile(this)">
<p>Or paste roster data:</p>
<textarea id="rosterInput" placeholder="Paste roster data here"></textarea>
<div class="btn-row"><button class="btn-primary" onclick="loadRoster()">Load Roster</button><button class="btn-secondary" onclick="loadDemo()">Demo</button><button class="btn-danger" onclick="clearAll()">Clear All</button></div>
</div></div>
<script>
var roster=[],SK='dp_roster2',DK='dp_date2',activeLane=1;

function init(){
    updateDate();loadFromStorage();
    buildLaneSelector();
    if(roster.length){showTab('arrivals')}else{showTab('edit')}
    render();updateStats();
    // Auto-reset on new day
    var s=localStorage.getItem(DK),t=new Date().toISOString().split('T')[0];
    if(s&&s!==t&&roster.length){for(var i=0;i<roster.length;i++){roster[i].status='pending';roster[i].arrivalTime=null;roster[i].lane=null;roster[i].departedTime=null}saveToStorage();render();updateStats()}
    localStorage.setItem(DK,t);
    // Update OTD status every 30 seconds
    setInterval(function(){if(document.getElementById('viewDepartures').className.indexOf('hidden')===-1)renderDepartures()},30000);
}

function updateDate(){var n=new Date(),d=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('currentDate').textContent=d[n.getDay()]+' '+n.getDate()+' '+m[n.getMonth()]+' '+n.getFullYear()}

function showTab(t){
    var views=['Arrivals','Departures','Lanes','Routes','Edit'];
    for(var i=0;i<views.length;i++){
        document.getElementById('view'+views[i]).className=(views[i].toLowerCase()===t)?'':'hidden';
        document.getElementById('tab'+views[i]).className=(views[i].toLowerCase()===t)?'active':'';
    }
    if(t==='departures')renderDepartures();
    if(t==='lanes')renderLanes();
    if(t==='routes')renderRoutes();
    if(t==='arrivals')renderArrivals();
}

function buildLaneSelector(){
    var h='';for(var i=1;i<=8;i++){h+='<div class="lane-btn '+(i===activeLane?'active':'')+'" onclick="selectLane('+i+')">'+i+'</div>'}
    document.getElementById('laneSelector').innerHTML=h;
}
function selectLane(n){activeLane=n;buildLaneSelector()}

function conv24(t){t=t.toLowerCase().trim();var pm=t.indexOf('pm')!==-1,am=t.indexOf('am')!==-1;t=t.replace(/\s*(am|pm)/i,'').trim();var p=t.split(':'),h=parseInt(p[0],10)||0,mi=p.length>1?parseInt(p[1],10)||0:0;if(pm&&h<12)h+=12;if(am&&h===12)h=0;return h*60+mi}

function getPlannedDeparture(dp){
    if(!dp.startTime)return null;
    return conv24(dp.startTime)+15; // planned arrival + 15 min
}

function minutesToTime(mins){var h=Math.floor(mins/60),m=mins%60;var ampm=h>=12?'pm':'am';h=h>12?h-12:h;if(h===0)h=12;return h+':'+(m<10?'0':'')+m+' '+ampm}

function getOTDStatus(dp){
    if(!dp.startTime)return'unknown';
    var deadline=getPlannedDeparture(dp);
    if(dp.departedTime){
        var depMins=conv24(dp.departedTime);
        return depMins<=deadline?'ontime':'late';
    }
    // Still in lane - check clock
    var now=new Date(),nowMins=now.getHours()*60+now.getMinutes();
    if(nowMins>deadline)return'late';
    if(deadline-nowMins<=5)return'atrisk';
    return'ontrack';
}

function handleFile(input){var file=input.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){document.getElementById('rosterInput').value=e.target.result;loadRoster()};reader.readAsText(file);input.value=''}

function parseRawBlob(text){var results=[];text=text.replace(/DP ID.*?Cycle/i,'');text=text.replace(/(\d{1,2}):(\d)\s+(\d)\s+(am|pm)/gi,'$1:$2$3 $4');text=text.replace(/(\d{1,2}):(\d{2})\s+(am|pm)/gi,'$1:$2 $3');var parts=text.split(/(A[A-Z0-9]{4,19}(?=[A-Z][a-z]))/);for(var i=1;i<parts.length;i+=2){if(i+1>=parts.length)continue;var rest=parts[i+1];var nameMatch=rest.match(/^(.+?)(?:On Duty|AmFl)/);if(!nameMatch)continue;var name=nameMatch[1].trim().replace(/\s*NONE\s*$/i,'').replace(/^-\s*/,'').trim();if(!name||name.length<2)continue;var times=rest.match(/(\d{1,2}:\d{2}\s*[ap]m)/gi);var startTime=(times&&times.length>=1)?times[0]:'';var shiftMatch=rest.match(/(\d+\s*Hours(?:\s*\d+\s*minutes)?)/i);var shiftLength=shiftMatch?shiftMatch[1]:'';var svcMatch=rest.match(/(AmFlex[^,\t\n]*?)(?:\d+\s*Hours)/i);var serviceType=svcMatch?svcMatch[1].trim():'';results.push({name:name,startTime:startTime,shiftLength:shiftLength,serviceType:serviceType,status:'pending',arrivalTime:null,lane:null,departedTime:null})}return results}

function parseInput(input){var lines=input.split('\n');var results=[];var isTab=lines.length>1&&lines[0].indexOf('\t')!==-1;var fullText=input.replace(/\n/g,' ').replace(/\s+/g,' ');var isRawBlob=!isTab&&fullText.length>200&&/A[A-Z0-9]{4,19}[A-Z][a-z]/.test(fullText)&&(fullText.match(/\d{1,2}:\d{2}\s*[ap]m/gi)||[]).length>2;if(isRawBlob){results=parseRawBlob(fullText)}else if(isTab){for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(!l)continue;var c=l.split('\t');if(c[0]&&(c[0].toLowerCase().indexOf('dp id')!==-1||c[0].toLowerCase().indexOf('dp name')!==-1))continue;var nm=(c[1]||'').trim(),svc=(c[3]||'').trim(),sh=(c[4]||'').trim(),st=(c[5]||'').trim(),av=(c[2]||'').trim();if(!nm)continue;if(av&&av.toLowerCase()!=='on duty')continue;results.push({name:nm,startTime:st,shiftLength:sh,serviceType:svc,status:'pending',arrivalTime:null,lane:null,departedTime:null})}}else{for(var j=0;j<lines.length;j++){var ln=lines[j].trim();if(!ln)continue;if(ln.length>200&&/A[A-Z0-9]{4,19}[A-Z][a-z]/.test(ln)){results=results.concat(parseRawBlob(ln));continue}var p=ln.split(',');if(p[0]&&p[0].toLowerCase().indexOf('dp name')!==-1)continue;var nm2=(p[0]||'').trim(),st2=p.length>1?p[1].trim():'',svc2=p.length>2?p[2].trim():'',sh2=p.length>3?p[3].trim():'';if(!nm2)continue;results.push({name:nm2,startTime:st2,shiftLength:sh2,serviceType:svc2,status:'pending',arrivalTime:null,lane:null,departedTime:null})}}var seen={},uniq=[];for(var k=0;k<results.length;k++){var key=results[k].name.toLowerCase();if(!seen[key]){seen[key]=true;uniq.push(results[k])}}uniq.sort(function(a,b){if(!a.startTime&&!b.startTime)return 0;if(!a.startTime)return 1;if(!b.startTime)return-1;return conv24(a.startTime)-conv24(b.startTime)});return uniq}

function loadRoster(){var input=document.getElementById('rosterInput').value.trim();if(!input){alert('Paste data or upload file');return}roster=parseInput(input);if(!roster.length){alert('No valid entries');return}saveToStorage();render();updateStats();showTab('arrivals')}

function render(){renderArrivals();renderDepartures();renderLanes();renderRoutes()}

function renderArrivals(){
    var list=document.getElementById('arrivalList');
    if(!roster.length){list.innerHTML='<div class="empty-state"><h2>No Roster</h2><p>Go to Edit tab to load data</p></div>';return}
    var cw='',h='';
    for(var i=0;i<roster.length;i++){
        var dp=roster[i],w=dp.startTime||'No Time';
        if(w!==cw){cw=w;h+='<div class="wave-header">Start: '+esc(w)+'</div>'}
        var cls=dp.status==='arrived'?'arrived':dp.status==='noshow'?'noshow':'';
        h+='<div class="roster-item '+cls+'">';
        h+='<div class="checks"><div class="chk chk-yes '+(dp.status==='arrived'?'active':'')+'" onclick="markArrived('+i+')">\u2713</div><div class="chk chk-no '+(dp.status==='noshow'?'active':'')+'" onclick="markNoShow('+i+')">\u2717</div></div>';
        h+='<div class="info"><div class="dp-name">'+esc(dp.name)+'</div>';
        var dt=[];if(dp.serviceType)dt.push(dp.serviceType);if(dp.shiftLength)dt.push(dp.shiftLength);
        if(dt.length)h+='<div class="dp-details">'+esc(dt.join(' | '))+'</div>';
        if(dp.status==='arrived')h+='<div class="arrival-time">Arrived '+dp.arrivalTime+(dp.lane?' | Lane '+dp.lane:'')+'</div>';
        h+='</div><div class="time-col">';
        if(dp.lane)h+='<span class="lane-badge">L'+dp.lane+'</span> ';
        if(dp.startTime)h+='<span class="scheduled-time">'+esc(dp.startTime)+'</span>';
        h+='</div></div>';
    }
    list.innerHTML=h;
}

function markArrived(i){
    if(roster[i].status==='arrived'){roster[i].status='pending';roster[i].arrivalTime=null;roster[i].lane=null}
    else{roster[i].status='arrived';var n=new Date(),hh=n.getHours(),mm=n.getMinutes();roster[i].arrivalTime=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;roster[i].lane=activeLane}
    saveToStorage();renderArrivals();updateStats();
}
function markNoShow(i){
    if(roster[i].status==='noshow'){roster[i].status='pending';roster[i].arrivalTime=null;roster[i].lane=null}
    else{roster[i].status='noshow';roster[i].arrivalTime=null;roster[i].lane=null;roster[i].departedTime=null}
    saveToStorage();renderArrivals();updateStats();
}

function renderDepartures(){
    var list=document.getElementById('departureList');
    var inLane=roster.filter(function(dp){return dp.status==='arrived'&&dp.lane&&!dp.departedTime});
    var departed=roster.filter(function(dp){return dp.departedTime});
    // Calculate OTD
    var otdTotal=departed.length+inLane.filter(function(dp){return getOTDStatus(dp)==='late'}).length;
    var otdPass=departed.filter(function(dp){return getOTDStatus(dp)==='ontime'}).length;
    var otdPct=otdTotal>0?Math.round((otdPass/otdTotal)*100):'--';
    var pctEl=document.getElementById('otdPct');
    pctEl.textContent=otdPct+(otdPct!=='--'?'%':'');
    pctEl.className='otd-pct '+(otdPct>=90?'otd-green':otdPct>=80?'otd-yellow':'otd-red');

    if(!inLane.length&&!departed.length){list.innerHTML='<div class="empty-state"><p>No DPs in lanes yet</p></div>';return}
    var h='';
    if(inLane.length){
        h+='<div class="wave-header">In Lane — Awaiting Departure</div>';
        for(var i=0;i<inLane.length;i++){
            var dp=inLane[i];var idx=roster.indexOf(dp);
            var status=getOTDStatus(dp);
            var deadline=getPlannedDeparture(dp);
            var deadlineStr=deadline?minutesToTime(deadline):'';
            var badgeCls=status==='ontrack'?'badge-green':status==='atrisk'?'badge-yellow':'badge-red';
            var statusTxt=status==='ontrack'?'ON TRACK':status==='atrisk'?'AT RISK':'LATE';
            h+='<div class="dep-item '+status+'">';
            h+='<span class="status-badge '+badgeCls+'">'+statusTxt+'</span>';
            h+='<div class="info"><div class="dp-name">'+esc(dp.name)+'</div>';
            h+='<div class="dep-details">Lane '+dp.lane+' | Must depart by '+deadlineStr+'</div></div>';
            h+='<button class="dep-btn" onclick="markDeparted('+idx+')">Departed</button></div>';
        }
    }
    if(departed.length){
        h+='<div class="wave-header">Departed</div>';
        for(var j=0;j<departed.length;j++){
            var dp2=departed[j];
            var s2=getOTDStatus(dp2);
            var badgeCls2=s2==='ontime'?'badge-green':'badge-red';
            var statusTxt2=s2==='ontime'?'ON TIME':'LATE';
            h+='<div class="dep-item '+s2+'">';
            h+='<span class="status-badge '+badgeCls2+'">'+statusTxt2+'</span>';
            h+='<div class="info"><div class="dp-name">'+esc(dp2.name)+'</div>';
            h+='<div class="dep-details">Lane '+dp2.lane+' | Departed '+dp2.departedTime+'</div></div></div>';
        }
    }
    list.innerHTML=h;
}

function markDeparted(i){
    var n=new Date(),hh=n.getHours(),mm=n.getMinutes();
    roster[i].departedTime=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
    saveToStorage();renderDepartures();
}

function renderLanes(){
    var view=document.getElementById('lanesView');
    var lanes={};for(var i=1;i<=8;i++)lanes[i]=[];
    for(var j=0;j<roster.length;j++){if(roster[j].lane&&roster[j].status==='arrived')lanes[roster[j].lane].push(roster[j])}
    var h='';
    for(var l=1;l<=8;l++){
        var dps=lanes[l];
        if(!dps.length)continue;
        var inLane=dps.filter(function(d){return!d.departedTime});
        var gone=dps.filter(function(d){return d.departedTime});
        h+='<div class="lane-card"><h3>Lane '+l+' — '+inLane.length+' in lane'+(gone.length?' ('+gone.length+' departed)':'')+'</h3>';
        h+='<div class="names">';
        for(var k=0;k<dps.length;k++){
            var status=getOTDStatus(dps[k]);
            var icon=dps[k].departedTime?(status==='ontime'?'\u2705':'\u274C'):(status==='late'?'\uD83D\uDD34':status==='atrisk'?'\uD83D\uDFE1':'\uD83D\uDFE2');
            h+=icon+' '+esc(dps[k].name)+(dps[k].departedTime?' (dep '+dps[k].departedTime+')':'')+('<br>');
        }
        h+='</div></div>';
    }
    if(!h)h='<div class="empty-state"><p>No DPs assigned to lanes yet</p></div>';
    view.innerHTML=h;
}

function renderRoutes(){
    var list=document.getElementById('summaryList');
    var noShows=roster.filter(function(dp){return dp.status==='noshow'});
    if(!noShows.length){list.innerHTML='<div class="empty-state"><p>No no-shows yet</p></div>';return}
    var groups={};for(var i=0;i<noShows.length;i++){var key=(noShows[i].serviceType||'Unknown')+'|'+(noShows[i].shiftLength||'');if(!groups[key])groups[key]={serviceType:noShows[i].serviceType||'Unknown',shiftLength:noShows[i].shiftLength||'',count:0};groups[key].count++}
    var h='',total=0;for(var k in groups){var g=groups[k];total+=g.count;var label=g.serviceType;if(g.shiftLength)label+=' ('+g.shiftLength+')';h+='<div class="summary-item"><div class="svc-name">'+esc(label)+'</div><div class="route-count">'+g.count+'</div></div>'}
    h+='<div class="summary-total"><div class="label">Total Routes to Open</div><div class="count">'+total+'</div></div>';
    list.innerHTML=h;
}

function updateStats(){var t=roster.length,a=0,ns=0;for(var i=0;i<t;i++){if(roster[i].status==='arrived')a++;if(roster[i].status==='noshow')ns++}document.getElementById('arrivedCount').textContent=a;document.getElementById('noshowCount').textContent=ns;document.getElementById('pendingCount').textContent=t-a-ns;document.getElementById('totalCount').textContent=t}
function saveToStorage(){localStorage.setItem(SK,JSON.stringify(roster))}
function loadFromStorage(){try{var d=localStorage.getItem(SK);if(d)roster=JSON.parse(d)}catch(e){roster=[]}}
function clearAll(){if(confirm('Clear all?')){roster=[];localStorage.removeItem(SK);document.getElementById('rosterInput').value='';render();updateStats();showTab('edit')}}
