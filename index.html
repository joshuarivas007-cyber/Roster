<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>DP Arrival Roster</title><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;padding:8px}.header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#16213e;border-radius:8px;margin-bottom:8px}.header h1{font-size:18px;font-weight:600;color:#ff9f1c}.header .date{font-size:14px;color:#aaa}.stats-bar{display:flex;gap:12px;padding:8px 12px;background:#16213e;border-radius:8px;margin-bottom:8px;font-size:14px}.stat{display:flex;align-items:center;gap:4px}.stat .dot{width:10px;height:10px;border-radius:50%}.dot-arrived{background:#2ecc71}.dot-pending{background:#e74c3c}.dot-total{background:#3498db}.input-section{background:#16213e;border-radius:8px;padding:12px;margin-bottom:8px}.input-section h2{font-size:15px;margin-bottom:8px;color:#ff9f1c}.input-section p{font-size:12px;color:#aaa;margin-bottom:8px;line-height:1.4}textarea{width:100%;height:120px;background:#0f3460;border:1px solid #333;border-radius:6px;color:#eee;padding:8px;font-size:12px;font-family:monospace;resize:vertical}textarea::placeholder{color:#666}.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}button{padding:10px 16px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;touch-action:manipulation}.btn-primary{background:#ff9f1c;color:#1a1a2e}.btn-danger{background:#e74c3c;color:#fff}.btn-secondary{background:#333;color:#eee}.roster-list{display:flex;flex-direction:column;gap:4px}.roster-item{display:flex;align-items:center;padding:12px;background:#16213e;border-radius:8px;border-left:4px solid #e74c3c;cursor:pointer}.roster-item.arrived{border-left-color:#2ecc71;background:#1a2e1a}.roster-item .checkbox{width:36px;height:36px;border:2px solid #555;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0;font-size:20px}.roster-item.arrived .checkbox{background:#2ecc71;border-color:#2ecc71;color:#fff}.roster-item .info{flex:1;min-width:0}.roster-item .dp-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.roster-item .dp-details{font-size:12px;color:#aaa;margin-top:2px}.roster-item .arrival-time{font-size:12px;color:#2ecc71;font-weight:600}.roster-item .time-col{text-align:right;flex-shrink:0;margin-left:8px}.roster-item .scheduled-time{font-size:13px;color:#ff9f1c;font-weight:500}.wave-header{padding:6px 12px;background:#0f3460;border-radius:6px;font-size:13px;font-weight:600;color:#3498db;margin-top:8px;margin-bottom:4px}.empty-state{text-align:center;padding:40px 20px;color:#666}.empty-state h2{font-size:18px;margin-bottom:8px;color:#aaa}.view-toggle{display:flex;gap:4px;background:#0f3460;border-radius:6px;padding:3px}.view-toggle button{padding:6px 12px;font-size:12px;background:transparent;color:#aaa;border-radius:4px}.view-toggle button.active{background:#ff9f1c;color:#1a1a2e}.hidden{display:none}.roster-actions{display:flex;gap:8px;margin-top:12px;justify-content:center}.upload-area{border:2px dashed #3498db;border-radius:8px;padding:20px;text-align:center;margin-bottom:10px;cursor:pointer}.upload-area p{color:#3498db;font-size:14px;font-weight:600}.upload-area .sub{color:#666;font-size:11px;margin-top:4px;font-weight:400}input[type=file]{display:none}</style></head><body><div class="header"><h1>DP Arrival Roster</h1><div><div class="date" id="currentDate"></div><div class="view-toggle" style="margin-top:4px"><button id="btnRoster" onclick="showView('roster')">Roster</button><button id="btnEdit" onclick="showView('input')">Edit</button></div></div></div><div class="stats-bar"><div class="stat"><div class="dot dot-arrived"></div><span id="arrivedCount">0</span> Arrived</div><div class="stat"><div class="dot dot-pending"></div><span id="pendingCount">0</span> Pending</div><div class="stat"><div class="dot dot-total"></div><span id="totalCount">0</span> Total</div></div><div class="input-section" id="inputView"><h2>Load Roster</h2><div class="upload-area" onclick="document.getElementById('fileInput').click()"><p>Tap to Upload Text File</p><p class="sub">Upload .txt or .csv with roster data</p></div><input type="file" id="fileInput" accept=".txt,.csv,.text" onchange="handleFile(this)"><p>Or paste roster data below:</p><textarea id="rosterInput" placeholder="Paste roster data here - any format"></textarea><div class="btn-row"><button class="btn-primary" onclick="loadRoster()">Load Roster</button><button class="btn-danger" onclick="clearAll()">Clear All</button></div></div><div id="rosterView" class="hidden"><div class="roster-list" id="rosterList"></div><div class="roster-actions"><button class="btn-secondary" onclick="resetArrivals()">Reset All Ticks</button></div></div><script>
var roster=[],SK='dp_roster',DK='dp_date';

function init(){updateDate();loadFromStorage();roster.length?showView('roster'):showView('input');renderRoster();updateStats();var s=localStorage.getItem(DK),t=new Date().toISOString().split('T')[0];if(s&&s!==t&&roster.length){for(var i=0;i<roster.length;i++){roster[i].arrived=false;roster[i].arrivalTime=null}saveToStorage();renderRoster();updateStats()}localStorage.setItem(DK,t)}
function updateDate(){var n=new Date(),d=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('currentDate').textContent=d[n.getDay()]+' '+n.getDate()+' '+m[n.getMonth()]+' '+n.getFullYear()}
function showView(v){document.getElementById('inputView').className=v==='input'?'input-section':'input-section hidden';document.getElementById('rosterView').className=v==='roster'?'':'hidden';document.getElementById('btnRoster').className=v==='roster'?'active':'';document.getElementById('btnEdit').className=v==='input'?'active':''}
function conv24(t){t=t.toLowerCase().trim();var pm=t.indexOf('pm')!==-1,am=t.indexOf('am')!==-1;t=t.replace(/\s*(am|pm)/i,'').trim();var p=t.split(':'),h=parseInt(p[0],10)||0,mi=p.length>1?p[1].trim():'00';if(pm&&h<12)h+=12;if(am&&h===12)h=0;return(h<10?'0':'')+h+':'+mi}

function handleFile(input){
    var file=input.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){document.getElementById('rosterInput').value=e.target.result;loadRoster()};
    reader.readAsText(file);input.value='';
}

function parseRawBlob(text){
    var results=[];
    text=text.replace(/DP ID.*?Cycle/i,'');
    text=text.replace(/(\d{1,2}):(\d)\s+(\d)\s+(am|pm)/gi,'$1:$2$3 $4');
    text=text.replace(/(\d{1,2}):(\d{2})\s+(am|pm)/gi,'$1:$2 $3');
    var parts=text.split(/(A[A-Z0-9]{4,19}(?=[A-Z][a-z]))/);
    for(var i=1;i<parts.length;i+=2){
        if(i+1>=parts.length)continue;
        var rest=parts[i+1];
        var nameMatch=rest.match(/^(.+?)(?:On Duty|AmFl)/);
        if(!nameMatch)continue;
        var name=nameMatch[1].trim().replace(/\s*NONE\s*$/i,'').replace(/^-\s*/,'').trim();
        if(!name||name.length<2)continue;
        var times=rest.match(/(\d{1,2}:\d{2}\s*[ap]m)/gi);
        var startTime=(times&&times.length>=1)?times[0]:'';
        var shiftMatch=rest.match(/(\d+\s*Hours(?:\s*\d+\s*minutes)?)/i);
        var shiftLength=shiftMatch?shiftMatch[1]:'';
        var svcMatch=rest.match(/(AmFlex[^,\t\n]*?)(?:\d+\s*Hours)/i);
        var serviceType=svcMatch?svcMatch[1].trim():'';
        results.push({name:name,startTime:startTime,shiftLength:shiftLength,serviceType:serviceType,arrived:false,arrivalTime:null});
    }
    return results;
}

function parseInput(input){
    var lines=input.split('\n');var results=[];
    var isTab=lines.length>1&&lines[0].indexOf('\t')!==-1;
    var fullText=input.replace(/\n/g,' ').replace(/\s+/g,' ');
    var isRawBlob=!isTab&&fullText.length>200&&/A[A-Z0-9]{4,19}[A-Z][a-z]/.test(fullText)&&(fullText.match(/\d{1,2}:\d{2}\s*[ap]m/gi)||[]).length>2;

    if(isRawBlob){results=parseRawBlob(fullText)}
    else if(isTab){for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(!l)continue;var c=l.split('\t');if(c[0]&&(c[0].toLowerCase().indexOf('dp id')!==-1||c[0].toLowerCase().indexOf('dp name')!==-1))continue;var nm=(c[1]||'').trim(),svc=(c[3]||'').trim(),sh=(c[4]||'').trim(),st=(c[5]||'').trim(),av=(c[2]||'').trim();if(!nm)continue;if(av&&av.toLowerCase()!=='on duty')continue;results.push({name:nm,startTime:st,shiftLength:sh,serviceType:svc,arrived:false,arrivalTime:null})}}
    else{for(var j=0;j<lines.length;j++){var ln=lines[j].trim();if(!ln)continue;if(ln.length>200&&/A[A-Z0-9]{4,19}[A-Z][a-z]/.test(ln)){results=results.concat(parseRawBlob(ln));continue}var p=ln.split(',');if(p[0]&&p[0].toLowerCase().indexOf('dp name')!==-1)continue;var nm2=(p[0]||'').trim(),st2=p.length>1?p[1].trim():'',svc2=p.length>2?p[2].trim():'',sh2=p.length>3?p[3].trim():'';if(!nm2)continue;results.push({name:nm2,startTime:st2,shiftLength:sh2,serviceType:svc2,arrived:false,arrivalTime:null})}}

    var seen={},uniq=[];for(var k=0;k<results.length;k++){var key=results[k].name.toLowerCase();if(!seen[key]){seen[key]=true;uniq.push(results[k])}}
    uniq.sort(function(a,b){if(!a.startTime&&!b.startTime)return 0;if(!a.startTime)return 1;if(!b.startTime)return-1;return conv24(a.startTime).localeCompare(conv24(b.startTime))});
    return uniq;
}

function loadRoster(){var input=document.getElementById('rosterInput').value.trim();if(!input){alert('Paste data or upload a file');return}roster=parseInput(input);if(!roster.length){alert('No valid entries found');return}saveToStorage();renderRoster();updateStats();showView('roster')}
function renderRoster(){var list=document.getElementById('rosterList');if(!roster.length){list.innerHTML='<div class="empty-state"><h2>No Roster</h2><p>Tap Edit to load roster</p></div>';return}var cw='',h='';for(var i=0;i<roster.length;i++){var dp=roster[i],w=dp.startTime||'No Time';if(w!==cw){cw=w;h+='<div class="wave-header">Start: '+esc(w)+'</div>'}h+='<div class="roster-item '+(dp.arrived?'arrived':'')+'" onclick="toggleArrival('+i+')">';h+='<div class="checkbox">'+(dp.arrived?'\u2713':'')+'</div><div class="info">';h+='<div class="dp-name">'+esc(dp.name)+'</div>';var dt=[];if(dp.serviceType)dt.push(dp.serviceType);if(dp.shiftLength)dt.push(dp.shiftLength);if(dt.length)h+='<div class="dp-details">'+esc(dt.join(' | '))+'</div>';if(dp.arrived)h+='<div class="arrival-time">Arrived '+dp.arrivalTime+'</div>';h+='</div><div class="time-col">';h+=dp.arrived?'<div class="arrival-time">'+dp.arrivalTime+'</div>':dp.startTime?'<div class="scheduled-time">'+esc(dp.startTime)+'</div>':'';h+='</div></div>'}list.innerHTML=h}
function toggleArrival(i){roster[i].arrived=!roster[i].arrived;if(roster[i].arrived){var n=new Date(),hh=n.getHours(),mm=n.getMinutes();roster[i].arrivalTime=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm}else{roster[i].arrivalTime=null}saveToStorage();renderRoster();updateStats()}
function updateStats(){var t=roster.length,a=0;for(var i=0;i<t;i++)if(roster[i].arrived)a++;document.getElementById('arrivedCount').textContent=a;document.getElementById('pendingCount').textContent=t-a;document.getElementById('totalCount').textContent=t}
function saveToStorage(){localStorage.setItem(SK,JSON.stringify(roster))}
function loadFromStorage(){try{var d=localStorage.getItem(SK);if(d)roster=JSON.parse(d)}catch(e){roster=[]}}
function clearAll(){if(confirm('Clear all?')){roster=[];localStorage.removeItem(SK);document.getElementById('rosterInput').value='';renderRoster();updateStats();showView('input')}}
function resetArrivals(){if(confirm('Reset ticks?')){for(var i=0;i<roster.length;i++){roster[i].arrived=false;roster[i].arrivalTime=null}saveToStorage();renderRoster();updateStats()}}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}
init();
</script></body></html>
